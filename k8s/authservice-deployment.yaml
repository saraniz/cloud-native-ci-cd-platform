apiVersion: apps/v1

kind: Deployment

metadata:
  name: auth-service-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: auth
  
  template:
    metadata:
      labels:
        app: auth

    spec:
      containers:
        - name: auth
          image: amiezz/myapp-auth:latest

          ports:
            - containerPort: 5001